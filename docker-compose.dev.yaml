services:
  api:
    environment:
      DEBUG: "true"
    volumes:
      - "./src/conode:/conode/src/conode/"

  postgres:
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak-db:
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 10