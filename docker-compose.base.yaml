services:
  api:
    build: .
    restart: on-failure
    container_name: api
    command: ["prodik", "api", "run"]
    ports:
      - 8000:8000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prodik-network

  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      prodik-network:
        aliases:
          - persistence.literally.io
    env_file:
      - "./deploy/postgres.env"

volumes:
  postgres-data:

networks:
  prodik-network:
    driver: bridge